name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  # 🔨 BUILD
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t my-app .

      - name: Save image
        run: docker save my-app -o my-app.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: my-app.tar


  # 🧪 TEST
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i my-app.tar

      - name: Run container
        run: |
          docker run -d -p 8080:80 --name test-container my-app
          sleep 5

      - name: Test app
        run: |
          curl http://localhost:8080 | grep "Hello"

      - name: Cleanup
        run: docker rm -f test-container


  # 🚀 DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user

            # install only if not installed
            if ! command -v docker &> /dev/null
            then
              sudo yum install -y docker git
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            rm -rf my-devops-app

            git clone https://github.com/anushka-p99soft/my-devops-app

            cd my-devops-app

            docker rm -f my-container || true

            docker build -t my-app .

            docker run -d -p 80:80 --name my-container my-app
